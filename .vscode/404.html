<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Ошибка 404 - StudentInvest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f8fafc; height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .error-card { 
            max-width: 500px; margin: auto; text-align: center; 
            background: white; padding: 50px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        .error-code { font-size: 8rem; font-weight: 900; color: #0052FF; line-height: 1; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">404</div>
        <h2 class="fw-bold mb-3">Страница не найдена</h2>
        <p class="text-muted mb-4">Похоже, эта финансовая тропа ведет в тупик. Давайте вернемся к вашим инвестициям.</p>
        <a href="/" class="btn btn-primary px-5 py-3 rounded-pill fw-bold" style="background: #0052FF; border: none;">На главную</a>
    </div>
</body>
</html>
