<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8"><title>Вход - StudentInvest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { 
            background: radial-gradient(circle at 0% 0%, #f1f5f9 0%, #e2e8f0 100%); 
            height: 100vh; display: flex; align-items: center; 
            font-family: 'Inter', sans-serif; 
        }
        .auth-card { 
            padding: 40px; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); border: 1px solid #e2e8f0;
            border-radius: 32px; width: 100%; max-width: 420px; margin: auto; 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .btn-primary { background: #0052FF; border: none; border-radius: 14px; font-weight: 600; padding: 12px; transition: transform 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .form-control { border-radius: 12px; padding: 12px; border: 1px solid #e2e8f0; }
        .password-toggle { cursor: pointer; background: #fff; border-left: none; border-radius: 0 12px 12px 0; border: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 15px; }
        .password-field { border-radius: 12px 0 0 12px !important; border-right: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h3 class="text-center mb-4" style="font-weight: 900; color: #0052FF; letter-spacing: 1px; font-size: 3rem;">STUDENT.INVEST</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}} small">{{m}}</div>{% endfor %}{% endif %}
        {% endwith %}
        <form method="POST">
            <div class="mb-3"><label>Номер телефона</label><input type="text" name="phone" class="form-control" placeholder="+7..." required></div>
            <div class="mb-3">
                <label>Пароль</label>
                <div class="input-group">
                    <input type="password" name="password" id="passwordInput" class="form-control password-field" required>
                    <span class="password-toggle" onclick="togglePassword()">
                        <i class="bi bi-eye" id="toggleIcon"></i>
                    </span>
                </div>
            </div>
            <div class="mb-4 p-3 border rounded bg-light d-flex align-items-center justify-content-between">
                <span class="fw-bold">Сколько будет {{ captcha }}?</span>
                <input type="number" name="captcha" class="form-control w-25" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
        </form>
        <p class="text-center mt-3 small">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                input.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
