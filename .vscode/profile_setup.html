<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8"><title>Завершение профиля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #fff; height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .auth-card { padding: 40px; border: 1px solid #eee; border-radius: 20px; width: 100%; max-width: 450px; margin: auto; }
        .btn-primary { background: #000; border: none; }
    </style>
</head>
<body>
    <div style="position: absolute; top: 20px; right: 20px;">
        <a href="/logout" class="btn btn-sm btn-outline-danger">Выход</a>
    </div>
    <div class="auth-card shadow-sm">
        <h3 class="fw-bold mb-3 text-center">Почти готово!</h3>
        <p class="text-muted text-center mb-4">Добавьте детали, чтобы ИИ мог лучше анализировать ваши расходы.</p>
        <form method="POST">
            <div class="mb-3"><label class="small fw-bold">Ваш Никнейм</label><input type="text" name="nickname" class="form-control" required placeholder="Напр: invest_student"></div>
            <div class="mb-3"><label class="small fw-bold">Ваш ВУЗ</label><input type="text" name="university" class="form-control" required placeholder="Напр: КазНУ, АИТУ"></div>
            <div class="mb-4"><label class="small fw-bold">Домашний адрес (для аналитики)</label><input type="text" name="address" class="form-control" required placeholder="Город, улица"></div>
            <button type="submit" class="btn btn-primary w-100 py-2">Завершить настройку</button>
        </form>
    </div>
</body>
</html>
