<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8"><title>Регистрация - StudentInvest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #fff; height: 100vh; display: flex; align-items: center; font-family: 'Inter', sans-serif; }
        .auth-card { padding: 40px; border: 1px solid #eee; border-radius: 24px; width: 100%; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-primary { background: #000; border: none; color: #fff; border-radius: 10px; padding: 10px; }
        .form-control { border: 1px solid #eee; border-radius: 10px; padding: 10px; }
        .form-control:focus { border-color: #000; box-shadow: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h3 class="text-center fw-bold mb-4">Регистрация</h3>
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3"><label>Телефон</label><input type="text" name="phone" class="form-control" required placeholder="+7..."></div>
                <div class="col-md-6 mb-3"><label>Пароль</label><input type="password" name="password" class="form-control" required></div>
            </div>
            <div class="mb-3"><label>ФИО</label><input type="text" name="full_name" class="form-control" required></div>
            <div class="mb-4">
                <label>Университет</label>
                <input type="text" name="university" class="form-control" list="uni-list" required placeholder="Начните вводить...">
                <datalist id="uni-list">
                    <option value="КазНУ им. аль-Фараби">
                    <option value="ENU (Евразийский национальный университет)">
                    <option value="AITU (Astana IT University)">
                    <option value="KBTU (Казахстанско-Британский технический университет)">
                    <option value="Satbayev University">
                    <option value="Назарбаев Университет">
                    <option value="UIB (Университет международного бизнеса)">
                </datalist>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Создать аккаунт</button>
        </form>
        <p class="text-center mt-3 small">Уже есть аккаунт? <a href="/login">Войти</a></p>
    </div>
</body>
</html>
