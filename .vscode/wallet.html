<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8"><title>Мой Кошелек - StudentInvest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --card-bg: #ffffff; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f1f5f9; --card-bg: #1e293b; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .wallet-card { background: linear-gradient(135deg, #0052FF 0%, #002D8B 100%); color: white; border-radius: 30px; padding: 40px; }
        .card { background: var(--card-bg); color: var(--text); }
    </style>
</head>
<body data-theme="light">
    <div class="container py-5">
        <a href="/" class="btn btn-link text-dark mb-4 p-0 text-decoration-none"><i class="bi bi-arrow-left"></i> На главную</a>
        
        <div class="wallet-card mb-5 shadow-lg">
            <h6 class="opacity-75">Доступный баланс</h6>
            <h1 class="display-4 fw-bold mb-4">{{ "%.2f"|format(finance.balance) }} ₸</h1>
            <div class="d-flex gap-3">
                <button class="btn btn-light px-4 py-2 fw-bold" data-bs-toggle="modal" data-bs-target="#depositModal">Пополнить</button>
                <button class="btn btn-outline-light px-4 py-2 fw-bold" data-bs-toggle="modal" data-bs-target="#withdrawModal">Снять</button>
            </div>
        </div>

        <h4 class="fw-bold mb-4">Связанные карты</h4>
        <div class="row">
            {% for card in finance.linked_cards %}
            <div class="col-md-4 mb-3">
                <div class="card border-0 shadow-sm p-4 rounded-4">
                    <div class="d-flex justify-content-between">
                        <i class="bi bi-credit-card-2-front fs-2 text-primary"></i>
                        <span class="text-muted small">{{ card.bank }}</span>
                    </div>
                    <h5 class="mt-3">{{ card.number }}</h5>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="py-4 mt-5 border-top">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <span style="font-weight: 900; color: #0052FF; letter-spacing: 0.5px; font-size: 1.5rem;">STUDENT.INVEST</span>
                    <p class="text-muted small mb-0">Безопасное управление вашими финансами.</p>
                </div>
                <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
                    <i class="bi bi-shield-fill-check text-success"></i> <span class="small text-muted">SSL Protection</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Вставь здесь модалки depositModal и withdrawModal из index.html -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Синхронизация темы
        document.body.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
    </script>
</body>
</html>
